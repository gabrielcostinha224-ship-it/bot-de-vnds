<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gabriel Star - Bot Manager</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #2a2a2a; padding: 30px; border-radius: 10px; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 350px; }
        input { width: 90%; padding: 10px; margin: 15px 0; border-radius: 5px; border: none; }
        button { background: #00ff6a; color: black; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #00cc55; }
        .status { margin-top: 15px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Gabriel Star Bot</h2>
        <p>Insira o Token do seu Bot abaixo:</p>
        <input type="password" id="token" placeholder="Seu Token do Discord">
        <br>
        <button onclick="ligar()">Ligar Bot Agora</button>
        <div id="status" class="status"></div>
    </div>

    <script>
        async function ligar() {
            const token = document.getElementById('token').value;
            const status = document.getElementById('status');
            if(!token) return alert("Digite o token!");

            status.innerText = "⏳ Tentando ligar...";
            const response = await fetch('/ligar-bot', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            });
            
            const data = await response.json();
            if(data.msg === "OK") {
                status.style.color = "#00ff6a";
                status.innerText = "✅ Bot Online com Sucesso!";
            } else {
                status.style.color = "#ff4444";
                status.innerText = "❌ Erro ao ligar. Verifique o token.";
            }
        }
    </script>
</body>
</html>
